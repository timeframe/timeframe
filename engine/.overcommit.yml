PreCommit:
  HerbAnalyze:
    enabled: true
    command: ['bundle', 'exec', 'herb', 'analyze']
    include: '**/*.erb'
  StandardRB:
    enabled: true
    command: ['bundle', 'exec', 'standardrb']
  RailsTest:
    enabled: true
    command: ['bundle', 'exec', 'rake', 'test']
  VerifyConsumers:
    enabled: true
    command: ['script/verify-consumers']
